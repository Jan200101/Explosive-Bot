os:
  - linux
  - osx

matrix:
  allow_failures:
    os: osx
    python:
      - "3.7-dev"

language:
  - python

python:
  - "3.5"
  - "3.5-dev"
  - "3.6"
  - "3.7-dev"


install:
  - pip install -r requirements.txt

script:
  - python -m compileall ./bot.py
  - python -m compileall ./compatibility/*
  - python ./bot.py --test-run

cache:
  - pip

notifications:
  email:
    - false
