os:
  - linux

language:
  - python

python:
  - "3.6"
  - "3.7-dev"


install:
  - pip install -r requirements.txt

script:
  - python -m compileall ./bot.py
  - python -m compileall ./compatibility/*.py
  - pyflakes ./bot.py
  - find ./addons -iname "*.py" | xargs pyflakes
  - python ./bot.py --test-run

cache:
  - pip

notifications:
  email:
    - false
